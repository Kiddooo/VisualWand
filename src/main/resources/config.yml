# VisualWand Configuration

# Language settings (en = English, pl = Polish)
language: en

# Wand settings
wand:
  # Material for the Architect's Wand
  material: BLAZE_ROD
  # Display name (supports color codes)
  name: "&6✦ &eRóżdżka Architekta &6✦"
  # Lore lines
  lore:
    - "&7"
    - "&fPPM na powietrze &8→ &aTwórz obiekty"
    - "&fPPM na obiekt &8→ &bEdytuj obiekt"
    - "&fShift + PPM &8→ &cUsuń obiekt"
    - "&7"
    - "&8Plugin by MiniGames.Cafe"

# Gizmo settings
gizmo:
  # Existing settings retained from the base plugin.
  particle-density: 20
  size: 1.5
  update-interval: 2

  colors:
    x-axis: [255, 0, 0]
    y-axis: [0, 255, 0]
    z-axis: [0, 0, 255]
    scale: [255, 255, 0]
    rotation: [255, 0, 255]

  # Crosshair movement preview introduced in Patch 2.
  move-preview:
    # Interaction behaviour
    min-distance: 0.5
    max-distance: 512.0
    scroll-step: 1.0
    fast-scroll-multiplier: 5.0
    surface-offset: 0.02

    # Update cadence, in server ticks
    update-interval: 1
    actionbar-update-interval: 10

    # Preview geometry
    axis-length: 0.24
    offset-line-threshold: 0.05
    beam-samples: 24
    axis-samples: 5
    offset-samples: 12

    # Semantic movement colours. Axis marker colours continue to use
    # gizmo.colors.x-axis, y-axis and z-axis above.
    colors:
      air: [255, 210, 45]
      surface: [75, 225, 95]
      no-surface: [235, 70, 70]
      offset: [230, 230, 230]

    particle-sizes:
      beam: 0.65
      axis: 0.8
      offset: 0.45
  transform-controls:
    # How often active transform sessions update, in server ticks.
    update-interval: 1

    # How often the action bar is refreshed, in transform-session updates.
    actionbar-update-interval: 8

    # Temporarily outline the selected display while transforming.
    glow-while-transforming: true

    move:
      min-distance: 0.5
      max-distance: 512.0
      scroll-step: 1.0
      crouch-scroll-multiplier: 5.0
      surface-offset: 0.02

    scale:
      # Multiplicative amount applied per mouse-wheel step.
      factor: 1.10
      fine-factor: 1.02
      min: 0.01
      max: 100.0

    rotation:
      step-degrees: 15.0
      fine-step-degrees: 5.0
      initial-axis: Y
# Editor settings
editor:
  # Maximum distance for ray-tracing (in blocks)
  max-distance: 50
  # Sensitivity for transformations
  move-sensitivity: 0.1
  rotate-sensitivity: 5.0
  scale-sensitivity: 0.05

# Animation settings
animations:
  # Default tick rate for animations
  tick-rate: 2
  # Presets
  presets:
    slow-rotation:
      type: ROTATION
      speed: 1.0
      axis: Y
    levitation:
      type: LEVITATION
      height: 0.5
      speed: 0.02
    pulsing:
      type: SCALE
      min-scale: 0.9
      max-scale: 1.1
      speed: 0.01

# Storage settings
storage:
  # Auto-save interval in minutes (0 = disabled)
  auto-save-interval: 5
  # Save displays on server stop
  save-on-stop: true
